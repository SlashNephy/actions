name: Build Docker Image

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      context:
        required: false
        type: string
        default: "."
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      image-platforms:
        required: false
        type: string
        default: linux/amd64
      cache-from:
        required: false
        type: string
        default: type=gha
      cache-to:
        required: false
        type: string
        default: type=gha,mode=max
      scan-image:
        required: false
        type: boolean
        default: true
      build-args:
        required: false
        type: string
        default: ""
      target:
        required: false
        type: string
        default: ""
      tag-spec:
        required: false
        type: string
        default: ""
      registry:
        required: false
        type: string
        default: ghcr.io
      registry-username:
        required: false
        type: string
        default: ""
      dispatch-update-image-digest:
        required: false
        type: boolean
        default: false
      free-disk-space:
        required: false
        type: boolean
        default: false
    secrets:
      registry-password:
        required: false
      build-args:
        required: false
      dispatch-github-token:
        required: false

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: read
      security-events: write
    steps:
      - uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        if: inputs.free-disk-space
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ (inputs.registry-username != '' && inputs.registry-username) || github.repository_owner }}
          password: ${{ (secrets.registry-password != '' && secrets.registry-password) || secrets.GITHUB_TOKEN }}
      - id: date
        run: echo "date=$(TZ=Asia/Tokyo date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT
      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: metadata
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.date.outputs.date }},enable={{is_default_branch}}
            ${{ inputs.tag-spec }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        id: build-push-action
        with:
          push: true
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          platforms: ${{ inputs.image-platforms }}
          cache-from: ${{ inputs.cache-from }}
          cache-to: ${{ inputs.cache-to }}
          build-args: |
            IMAGE_TAG=${{ steps.metadata.outputs.version }}
            COMMIT_ID=${{ github.sha }}
            ${{ inputs.build-args }}
            ${{ secrets.build-args }}
          target: ${{ inputs.target }}
          provenance: false
      - uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        if: inputs.dispatch-update-image-digest
        with:
          token: ${{ secrets.dispatch-github-token }}
          repository: SlashNephy/infrastructure
          event-type: update-image-digest
          client-payload: |-
            {
              "images": ${{ toJSON(fromJSON(steps.metadata.outputs.json).tags) }},
              "digest": "${{ steps.build-push-action.outputs.digest }}",
              "github": ${{ toJSON(github) }}
            }
      - uses: crazy-max/ghaction-container-scan@a0a3900b79d158c85ccf034e5368fae620a9233a # v4.0.0
        if: inputs.scan-image
        # 頻繁に Too Many Requests が発生するので失敗しても無視する
        # https://github.com/crazy-max/ghaction-container-scan/issues/162
        continue-on-error: true
        with:
          image: ${{ fromJSON(steps.metadata.outputs.json).tags[0] }}
          dockerfile: ${{ inputs.context }}/${{ inputs.dockerfile }}
          annotations: true
      - uses: github/codeql-action/upload-sarif@c793b717bc78562f491db7b0e93a3a178b099162 # v4.32.5
        if: inputs.scan-image && steps.scan.outputs.sarif != ''
        continue-on-error: true
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
